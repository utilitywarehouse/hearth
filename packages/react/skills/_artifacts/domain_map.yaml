skills:
  - name: 'hearth-react Component Reference'
    slug: 'hearth-react-component-reference'
    domain: 'component-usage'
    description: 'Find the right hearth-react component for a UI task and understand its API, props, usage guidelines, and accessibility requirements'
    type: 'core'
    covers:
      - 'All 60+ exported components'
      - 'Component prop types and defaults'
      - 'Accessibility props and patterns'
      - 'HearthProvider and context providers'
      - 'Icon usage with hearth-react-icons'
    tasks:
      - 'Find which component to use for a given UI element'
      - 'Understand a component's required and optional props'
      - 'Apply correct accessibility attributes to a component'
      - 'Use complex components (Modal, Combobox, CardAccordion)'
      - 'Understand when to use HearthProvider'
    failure_modes:
      - mistake: 'Using internal FormField component directly'
        mechanism: 'FormField is internal; consumers should use TextInput, Select, Combobox etc. directly — these components include their own label, helper text, and validation wiring'
        wrong_pattern: |
          import { FormField, TextInput } from '@utilitywarehouse/hearth-react';
          <FormField label="Name" id="name">
            <TextInput id="name" />
          </FormField>
        correct_pattern: |
          import { TextInput } from '@utilitywarehouse/hearth-react';
          <TextInput label="Name" id="name" />
        source: 'maintainer interview'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['hearth-react-component-reference']

      - mistake: 'Missing required loadingTitle on Skeleton'
        mechanism: 'loadingTitle is required for screen reader announcement; omitting it silently breaks accessibility with no visual indication'
        wrong_pattern: |
          <Skeleton>
            <SkeletonHeading width="60%" />
            <SkeletonBodyText lines="3" />
          </Skeleton>
        correct_pattern: |
          <Skeleton loadingTitle="user profile">
            <SkeletonHeading width="60%" />
            <SkeletonBodyText lines="3" />
          </Skeleton>
        source: 'src/components/Skeleton/Skeleton.props.ts'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['hearth-react-component-reference']

      - mistake: 'Missing label prop on IconButton'
        mechanism: 'label is required for accessibility; IconButton renders only an icon with no visible text so label provides the accessible name'
        wrong_pattern: |
          <IconButton variant="ghost" colorScheme="functional">
            <MenuIcon />
          </IconButton>
        correct_pattern: |
          <IconButton label="Open menu" variant="ghost" colorScheme="functional">
            <MenuIcon />
          </IconButton>
        source: 'src/components/IconButton/IconButton.props.ts'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['hearth-react-component-reference']

      - mistake: 'Using deprecated Modal loadingText prop'
        mechanism: 'loadingText was deprecated in v0.27.3; replaced by loadingHeading and loadingDescription for clearer separation'
        wrong_pattern: |
          <Modal heading="Confirm" loadingText="Please wait..." loading>
        correct_pattern: |
          <Modal
            heading="Confirm"
            loadingHeading="Please wait..."
            loadingDescription="Submitting your details"
            loading
          >
        source: 'CHANGELOG.md v0.27.3'
        priority: 'MEDIUM'
        status: 'fixed-but-legacy-risk'
        version_context: 'Deprecated in v0.27.3; agents trained on earlier examples will still generate loadingText'
        skills: ['hearth-react-component-reference']

      - mistake: 'Invalid Button variant and colorScheme combination'
        mechanism: "variant and colorScheme are a discriminated union; emphasis only accepts colorScheme='highlight', outline/ghost only accept functional/affirmative/destructive"
        wrong_pattern: |
          <Button variant="emphasis" colorScheme="affirmative">Submit</Button>
        correct_pattern: |
          <Button variant="emphasis" colorScheme="highlight">Submit</Button>
          <Button variant="solid" colorScheme="affirmative">Submit</Button>
        source: 'src/components/Button/Button.props.ts'
        priority: 'HIGH'
        status: 'active'
        skills: ['hearth-react-component-reference']

      - mistake: 'Omitting accessible label from Checkbox or Radio when no other label exists'
        mechanism: 'label prop is optional but some accessible label (label, aria-label, or aria-labelledby) is always required; absence is a silent accessibility failure with no TypeScript enforcement'
        wrong_pattern: |
          <Checkbox value="agree" />
        correct_pattern: |
          <Checkbox label="I agree to the terms and conditions" value="agree" />
        source: 'src/components/Checkbox/Checkbox.props.ts'
        priority: 'HIGH'
        status: 'active'
        skills: ['hearth-react-component-reference']

      - mistake: 'RadioTile assumes fill behaviour in a row layout'
        mechanism: 'RadioTile default changed in v0.25.0 from flex:1 (fill available space) to content-hug; existing row layouts need flex="1" to restore fill behaviour'
        wrong_pattern: |
          <RadioGroup direction="row">
            <RadioTile value="a" label="Option A" />
            <RadioTile value="b" label="Option B" />
          </RadioGroup>
        correct_pattern: |
          <RadioGroup direction="row">
            <RadioTile flex="1" value="a" label="Option A" />
            <RadioTile flex="1" value="b" label="Option B" />
          </RadioGroup>
        source: 'CHANGELOG.md v0.25.0'
        priority: 'MEDIUM'
        status: 'fixed-but-legacy-risk'
        version_context: 'Changed in v0.25.0; agents trained on earlier examples generate without flex="1"'
        skills: ['hearth-react-component-reference']

      - mistake: 'Not using HearthProvider when Tooltip is present'
        mechanism: 'Tooltip requires TooltipProvider context; HearthProvider wraps it and is the recommended approach as it may include additional providers in future'
        wrong_pattern: |
          function App({ children }) {
            return <>{children}</>;
          }
          // Tooltip used deeper in tree — fails silently
        correct_pattern: |
          import { HearthProvider } from '@utilitywarehouse/hearth-react';
          function App({ children }) {
            return <HearthProvider>{children}</HearthProvider>;
          }
        source: 'CHANGELOG.md v0.27.7; src/components/HearthProvider/HearthProvider.tsx'
        priority: 'HIGH'
        status: 'active'
        skills: ['hearth-react-component-reference', 'build-with-hearth-react']

  - name: 'Build with hearth-react'
    slug: 'build-with-hearth-react'
    domain: 'ui-composition'
    description: 'Guide agents to correctly use @utilitywarehouse/hearth-react when building web UI from a Figma design or from scratch'
    type: 'lifecycle'
    covers:
      - 'Layout system: Box, Flex, Grid, Container'
      - 'Style props and space tokens'
      - 'Responsive props and breakpoints'
      - 'Styling guidance: style props vs hearth-tokens'
      - 'asChild pattern for correct HTML semantics'
      - 'HearthProvider setup'
      - 'Next.js integration (use client, Link composition)'
      - 'Design-to-code workflow from Figma'
    tasks:
      - 'Implement a Figma page design using hearth-react components'
      - 'Build a new branded UI feature from scratch using hearth-react'
      - 'Set up a Next.js app with hearth-react'
      - 'Render a Button or Link as a Next.js Link component'
      - 'Apply responsive layout with breakpoint-aware props'
      - 'Apply custom styles using hearth-tokens alongside style props'
    failure_modes:
      - mistake: 'Using margin props on individual components instead of gap on parent container'
        mechanism: 'hearth-react recommends gap on Flex/Grid containers to control spacing; applying margin to individual children spreads layout responsibility across components'
        wrong_pattern: |
          <Flex>
            <Button marginRight="100">Cancel</Button>
            <Button>Submit</Button>
          </Flex>
        correct_pattern: |
          <Flex gap="100">
            <Button>Cancel</Button>
            <Button>Submit</Button>
          </Flex>
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'
        skills: ['build-with-hearth-react']

      - mistake: 'Using JS token values from hearth-tokens instead of style props or CSS variables'
        mechanism: 'Style props should be used first; for custom styling use CSS variables (already in scope, no import needed) in CSS files, or browser tokens via the hearth-tokens/browser import in React files'
        wrong_pattern: |
          import { space } from '@utilitywarehouse/hearth-tokens';
          <Box style={{ padding: space[200] }} />
        correct_pattern: |
          // Prefer style props:
          <Box padding="200" />

          // For custom React styles, import browser tokens:
          import { space } from '@utilitywarehouse/hearth-tokens/browser';
          <Box style={{ padding: space[200] }} />

          // For custom CSS, use CSS variables (already in scope, no import needed):
          // .custom { padding: var(--h-spacing-200); }
        source: 'maintainer interview'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['build-with-hearth-react']

      - mistake: 'Using raw inline styles for spacing and sizing instead of style props'
        mechanism: 'Style props map to design tokens and produce consistent, token-aligned output; raw CSS values bypass the token system and produce inconsistent designs'
        wrong_pattern: |
          <Box style={{ padding: '16px' }} />
          <Flex style={{ gap: '8px' }} />
        correct_pattern: |
          <Box padding="200" />
          <Flex gap="100" />
        source: 'maintainer interview; src/props/padding.props.ts'
        priority: 'HIGH'
        status: 'active'
        skills: ['build-with-hearth-react']

      - mistake: 'Nesting a Next.js Link inside Button without asChild'
        mechanism: 'Without asChild, the output is a button element wrapping an anchor — invalid HTML with broken navigation semantics; asChild merges props onto the child element via the Radix Slot pattern'
        wrong_pattern: |
          import NextLink from 'next/link';
          <Button variant="solid" colorScheme="highlight">
            <NextLink href="/next-page">Continue</NextLink>
          </Button>
        correct_pattern: |
          import NextLink from 'next/link';
          <Button asChild variant="solid" colorScheme="highlight">
            <NextLink href="/next-page">Continue</NextLink>
          </Button>
        source: 'maintainer interview; src/components/Button/Button.tsx'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['build-with-hearth-react']

      - mistake: 'Missing mobile breakpoint in a responsive prop object'
        mechanism: 'Breakpoints are not inherited from smaller viewports; an object without a mobile key applies no style at mobile — not the next smallest value'
        wrong_pattern: |
          <Flex direction={{ tablet: 'column' }}>
        correct_pattern: |
          <Flex direction={{ mobile: 'row', tablet: 'column' }}>
        source: 'src/helpers/ (responsive class generation logic)'
        priority: 'HIGH'
        status: 'active'
        skills: ['build-with-hearth-react']

      - mistake: "Using Box, Flex, or Grid as a span element without declaring as='span'"
        mechanism: 'These components always render as div by default; span must be explicitly set via the as prop'
        wrong_pattern: |
          <BodyText>
            <Box className="highlight">important</Box>
          </BodyText>
        correct_pattern: |
          <BodyText>
            <Box as="span" className="highlight">important</Box>
          </BodyText>
        source: 'src/components/Box/Box.tsx'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['build-with-hearth-react']

      - mistake: "Not adding 'use client' in Next.js App Router files that use hearth-react with interactivity"
        mechanism: "hearth-react components include 'use client' internally, but consuming files in the App Router also need the directive when they pass event handlers or use hooks alongside hearth-react components"
        wrong_pattern: |
          // app/page.tsx — no directive
          import { Button } from '@utilitywarehouse/hearth-react';
          export default function Page() {
            return <Button onClick={() => alert('clicked')}>Click</Button>;
          }
        correct_pattern: |
          'use client';
          import { Button } from '@utilitywarehouse/hearth-react';
          export default function Page() {
            return <Button onClick={() => alert('clicked')}>Click</Button>;
          }
        source: 'src/components/HearthProvider/HearthProvider.tsx (use client directive)'
        priority: 'HIGH'
        status: 'active'
        skills: ['build-with-hearth-react']

tensions:
  - name: 'Style props convenience vs custom design token access'
    skills: ['build-with-hearth-react', 'hearth-react-component-reference']
    description: 'Style props cover common token-based spacing/sizing/colour cases, but designs requiring values outside the prop system need hearth-tokens CSS variables or browser tokens'
    implication: 'An agent optimising for brevity uses style props everywhere and misses cases where hearth-tokens CSS variables are needed for custom styles'

  - name: 'Accessibility completeness vs generation brevity'
    skills: ['hearth-react-component-reference', 'build-with-hearth-react']
    description: 'Many components have required or strongly recommended accessibility props (label, loadingTitle, aria-labelledby) that agents omit when generating minimal code'
    implication: 'Generated code renders and compiles correctly but silently fails accessibility requirements, particularly for screen reader users'

