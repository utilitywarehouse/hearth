name: 'Chromatic'

on:
  push:
    paths:
      - 'packages/react/**'
      - 'packages/react-native/**'
    branches:
      - '*'
      - '!main'

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      react: ${{ steps.filter.outputs.react }}
      react-native: ${{ steps.filter.outputs.react-native }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            react:
              - 'packages/react/**'
            react-native:
              - 'packages/react-native/**'

  chromatic-react:
    needs: changes
    if: needs.changes.outputs.react == 'true'
    name: Run Chromatic
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.0.5
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_GLOBAL_READ_TOKEN }}

      - name: Run Chromatic
        uses: chromaui/action@98132da0fca2211fb41b3af7b49ce85176007851 # latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          buildScriptName: build:storybook:react
          exitOnceUploaded: true
          onlyChanged: true
          zip: true
          storybookBaseDir: packages/react

  chromatic-react-native:
    needs: changes
    if: needs.changes.outputs.react-native == 'true'
    name: Run Chromatic (React Native)
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.0.5
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_GLOBAL_READ_TOKEN }}

      - name: Run Chromatic
        uses: chromaui/action@98132da0fca2211fb41b3af7b49ce85176007851 # latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN_REACT_NATIVE }}
          buildScriptName: build:react-native
          exitOnceUploaded: true
          onlyChanged: true
          zip: true
          storybookBaseDir: packages/react-native
