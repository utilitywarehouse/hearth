name: Build Fonts
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'packages/fonts/**'
      - 'apps/storybook-fonts/**'
  push:
    branches:
      - main
    paths:
      - 'packages/fonts/**'
      - 'apps/storybook-fonts/**'

jobs:
  checks:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.2
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - run: pnpm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_GLOBAL_PUBLISH_TOKEN }}
      - run: pnpm build:fonts
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
