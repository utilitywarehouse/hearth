name: Publish React package on commit
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'packages/react/**'
  push:
    paths:
      - 'packages/react/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Build
    runs-on: ubuntu-latest
    if: github.event.label.name != 'skip-pkg-pr-new'
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.28.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - run: pnpm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_GLOBAL_READ_TOKEN }}
      - run: pnpm build:react
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'

      - run: pnpm dlx pkg-pr-new publish ./packages/react ./packages/css-reset --packageManager=yarn,pnpm,npm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
