name: Publish React package on commit
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'packages/react/**'
  push:
    paths:
      - 'packages/react/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  if: github.event.label.name == 'pkg-pr-new'
  preview:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9 # v2.14.1
        with:
          egress-policy: audit

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.28.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - run: pnpm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_GLOBAL_READ_TOKEN }}
      - run: pnpm build:react
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'

      - run: pnpm dlx pkg-pr-new publish ./packages/react ./packages/css-reset --packageManager=yarn,pnpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
