name: Figma Code Connect publish
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  code-connect:
    name: Code Connect
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.28.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - run: pnpm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_GLOBAL_READ_TOKEN }}

      - name: 🌝 Publish React Figma Code Connect
        working-directory: ./packages/react
        run: pnpm run figma:publish --token=${{ secrets.FIGMA_ACCESS_TOKEN }}

      # - name: 🌝 Publish React Native Figma Code Connect
      #   working-directory: ./packages/react-native
      #   run: pnpm run figma:publish --token=${{ secrets.FIGMA_ACCESS_TOKEN }}

      - name: 🌝 Publish React Icons Figma Code Connect
        working-directory: ./packages/react-icons
        run: pnpm run figma:publish --token=${{ secrets.FIGMA_ACCESS_TOKEN }}

      - name: 🌝 Publish React Native Icons Figma Code Connect
        working-directory: ./packages/react-native-icons
        run: pnpm run figma:publish --token=${{ secrets.FIGMA_ACCESS_TOKEN }}
