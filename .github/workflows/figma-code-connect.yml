name: Figma Code Connect publish
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  code-connect:
    name: Code Connect
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.0.5
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - run: pnpm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_GLOBAL_READ_TOKEN }}

      - name: Publish React Figma Code Connect
        working-directory: ./packages/react
        run: pnpm run figma:publish --token=${{ secrets.FIGMA_ACCESS_TOKEN }}

      - name: Publish React Native Figma Code Connect
        working-directory: ./packages/react-native
        run: pnpm run figma:publish --token=${{ secrets.FIGMA_ACCESS_TOKEN }}

      - name: Publish React Icons Figma Code Connect
        working-directory: ./packages/react-icons
        run: pnpm run figma:publish --token=${{ secrets.FIGMA_ACCESS_TOKEN }}

      - name: Publish React Native Icons Figma Code Connect
        working-directory: ./packages/react-native-icons
        run: pnpm run figma:publish --token=${{ secrets.FIGMA_ACCESS_TOKEN }}
