name: Docker Build & Push
on:
  push:
    branches:
      - main

jobs:
  build-and-push-storybook:
    name: Build & Push
    runs-on:
      - nscloud-ubuntu-24.04-amd64-4x8-with-cache
      - nscloud-cache-tag-cmsv2-build
      - nscloud-cache-size-20gb
      - nscloud-exp-container-image-cache
      - nscloud-exp-runner-tool-cache-10gb
    steps:
      - name: Check out source code
        uses: actions/checkout@v4

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: registry.uw.systems
          username: ${{ secrets.DOCKER_ID }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: metadata
        uses: docker/metadata-action@v4
        with:
          images: registry.uw.systems/design-systems/storybook
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.number }},enable=${{ github.event_name == 'pull_request' }}

      # Docker is automatically setup by using the remote Namespace runner
      # this remote runner enables better caching & more performance for container builds.
      # i.e. don't call `docker/setup-buildx-action`
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          file: apps/storybook-server/Dockerfile
          context: .
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          secrets: |
            npm_token=${{ secrets.NPM_GLOBAL_READ_TOKEN }}
