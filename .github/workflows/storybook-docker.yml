name: Docker Build & Push
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-push-storybook:
    name: Build & Push
    runs-on:
      - nscloud-ubuntu-24.04-amd64-4x8-with-cache
      - nscloud-cache-tag-cmsv2-build
      - nscloud-cache-size-20gb
      - nscloud-exp-container-image-cache
      - nscloud-exp-runner-tool-cache-10gb
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2 # v2.13.2
        with:
          egress-policy: audit

      - name: Check out source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Login to registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: registry.uw.systems
          username: ${{ secrets.DOCKER_ID }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: metadata
        uses: docker/metadata-action@818d4b7b91585d195f67373fd9cb0332e31a7175 # v4.6.0
        with:
          images: registry.uw.systems/design-systems/storybook
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.number }},enable=${{ github.event_name == 'pull_request' }}

      # Docker is automatically setup by using the remote Namespace runner
      # this remote runner enables better caching & more performance for container builds.
      # i.e. don't call `docker/setup-buildx-action`
      - name: Build and push Docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          file: apps/storybook-server/Dockerfile
          context: .
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          secrets: |
            npm_token=${{ secrets.NPM_GLOBAL_READ_TOKEN }}
