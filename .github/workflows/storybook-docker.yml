name: Docker Build & Push
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-push-storybook:
    name: Build & Push
    runs-on:
      - nscloud-ubuntu-24.04-amd64-4x8-with-cache
      - nscloud-cache-tag-cmsv2-build
      - nscloud-cache-size-20gb
      - nscloud-exp-container-image-cache
      - nscloud-exp-runner-tool-cache-10gb
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Check out source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: registry.uw.systems
          username: ${{ secrets.DOCKER_ID }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: registry.uw.systems/design-systems/storybook
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.number }},enable=${{ github.event_name == 'pull_request' }}

      # Docker is automatically setup by using the remote Namespace runner
      # this remote runner enables better caching & more performance for container builds.
      # i.e. don't call `docker/setup-buildx-action`
      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          file: apps/storybook-server/Dockerfile
          context: .
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          secrets: |
            npm_token=${{ secrets.NPM_GLOBAL_READ_TOKEN }}
