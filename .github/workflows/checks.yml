name: Code Checks
on: push

jobs:
  checks:
    name: Code Checks
    runs-on: ubuntu-latest
    steps:
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.2
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - run: pnpm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_GLOBAL_PUBLISH_TOKEN }}
      - run: pnpm build:icons
      - run: pnpm checks:ci
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
