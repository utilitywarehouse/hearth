name: Build And Test React Native
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'packages/react-native/**'
  push:
    branches:
      - main
    paths:
      - 'packages/react-native/**'

permissions:
  contents: read

jobs:
  checks:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Setup pnpm 🛠️
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.28.2
      - name: Checkout code 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js environment 🌐
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - name: Install dependencies 📦
        run: pnpm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_GLOBAL_READ_TOKEN }}
      - name: Build React Native project 📱
        run: pnpm build:react-native
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
      - name: Install Playwright Chromium 🧪
        run: pnpm --dir packages/react-native exec playwright install --with-deps chromium
      - name: Run React Native Storybook tests ✅
        run: pnpm --dir packages/react-native run test:storybook
