name: Generate Icons
on:
  workflow_dispatch:
    inputs:
      branchName:
        description: 'Branch name'
        required: true
        default: 'icons-release'
        type: string
      type:
        description: |
          The semver type <major|minor|patch> to bump the packages.
        required: true
        default: minor
        type: choice
        options:
          - patch
          - minor
          - major

env:
  CI: true

permissions:
  contents: read

jobs:
  generate:
    name: Generate icons packages
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.0.5
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - run: pnpm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_GLOBAL_READ_TOKEN }}

      - name: create env file
        run: |
          touch ./packages/svg-icons/.env
          echo FIGMA_ACCESS_TOKEN=${{ secrets.FIGMA_ACCESS_TOKEN }} >> ./packages/svg-icons/.env

      - name: Generate SVG icons
        run: pnpm generate:svg-icons

      - name: Generate React & React Native icons
        run: pnpm generate:react

      - name: Generate Storybook docs
        run: pnpm generate:storybook:icons

      - name: Format files
      - run: pnpm format

      - name: Set output variables
        id: vars
        run: |
          echo 'pr_body<<EOF' >> $GITHUB_OUTPUT
          echo "$(cat updated-icons.md)" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Add changeset
        run: |
          touch ./.changeset/${{ github.sha }}.md
          cat > ./.changeset/${{ github.sha }}.md << EOF
          ---
          "@utilitywarehouse/hearth-svg-icons": ${{ inputs.type }}
          "@utilitywarehouse/hearth-react-icons": ${{ inputs.type }}
          "@utilitywarehouse/hearth-react-native-icons": ${{ inputs.type }}
          ---

          EOF
          cat updated-icons.md >> ./.changeset/${{ github.sha }}.md
          rm updated-icons.md

      - name: Open pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.PAT }}
          branch: ${{ inputs.branchName }}
          title: 'Generate updated icons packages'
          commit-message: 'Generate updated icons packages'
          delete-branch: true
          base: main
          body: ${{ steps.vars.outputs.pr_body }}
