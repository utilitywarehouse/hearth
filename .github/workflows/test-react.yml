name: Test React
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/test-react.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'packages/react/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/test-react.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'packages/react/**'

permissions:
  contents: read

jobs:
  # if: false # I'm disabling this until I have the energy to continue trying to debug why it fails
  checks:
    name: storybook tests
    timeout-minutes: 20
    runs-on: ubuntu-latest

    container:
      # Make sure to grab the latest version of the Playwright image
      # https://playwright.dev/docs/docker#pull-the-image
      image: mcr.microsoft.com/playwright:v1.60.0-noble
      # Docker's default /dev/shm is 64MB. Chromium allocates shared memory per
      # browser context; across 63 sequential story files it exhausts the limit,
      # causing renderer crashes and fetch failures mid-run.
      options: --shm-size=2g
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 11.0.5
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_GLOBAL_READ_TOKEN }}
          # The playwright Docker image already has browsers installed at /ms-playwright.
          # Skip the postinstall download so pnpm install doesn't re-fetch them.
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 'true'
      - run: pnpm build
      - name: Run storybook tests
        run: |
          # 6 GB was too aggressive: ubuntu-latest runners have 7 GB total and
          # Chromium needs 1–2 GB on top of Node.js/Vite. The OOM killer (or
          # severe swap pressure) was intermittently killing the Vite dev server
          # mid-run, causing random "Failed to fetch setup file" failures.
          # 3 GB is enough for Vite + vitest and leaves headroom for the browser.
          #
          # A single CI-level retry handles any residual flakiness — vitest's own
          # `retry` option only retries individual test cases, not file-level
          # setup failures, so it cannot catch this class of error.
          pnpm test:react || {
            echo "First attempt failed — retrying once to handle intermittent CI infrastructure failures"
            pnpm test:react
          }
        env:
          NODE_OPTIONS: '--max-old-space-size=3072'
