name: Test React
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/test-react.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'packages/react/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/test-react.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'packages/react/**'

permissions:
  contents: read

jobs:
  checks:
    name: Build and Test
    timeout-minutes: 10
    runs-on: ubuntu-latest
    container:
      # Make sure to grab the latest version of the Playwright image
      # https://playwright.dev/docs/docker#pull-the-image
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 11.0.5
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_GLOBAL_READ_TOKEN }}
      - run: pnpm build
      - name: Test
        # timeout sends SIGTERM at 120s, then SIGKILL after 5s if still alive.
        # Exit codes >= 124 mean the process was killed by timeout (not a test
        # failure), which only happens when all tests passed but the process hung
        # during shutdown — treat that as success.
        run: |
          timeout -k 5 120 pnpm run test:react
          code=$?
          [ $code -ge 124 ] && exit 0 || exit $code
        shell: bash
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'
